name: CI

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'

permissions:
  contents: read

env:
  DOTNET_NOLOGO: true
  DOTNET_VERSION: 10.0.x
  CONFIGURATION: Release

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5.2.0
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          global-json-file: global.json

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration "${{ env.CONFIGURATION }}" --no-restore

  test:
    name: Test
    runs-on: ubuntu-latest
    needs:
      - build

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5.2.0
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          global-json-file: global.json

      - name: Restore
        run: dotnet restore

      - name: Test
        run: dotnet test --configuration "${{ env.CONFIGURATION }}" --no-restore

  format:
    name: Format
    runs-on: ubuntu-latest
    needs:
      - build

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5.2.0
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          global-json-file: global.json

      - name: Restore
        run: dotnet restore

      - name: Verify formatting
        continue-on-error: true
        run: dotnet format ./HEAL.HeuristicLib.sln --verify-no-changes --no-restore --severity error

  pack:
    name: Pack
    runs-on: ubuntu-latest
    needs:
      - test
      - format

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5.2.0
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          global-json-file: global.json

      - name: Restore
        run: dotnet restore

      - name: Pack NuGet packages
        run: dotnet pack --configuration "${{ env.CONFIGURATION }}" --no-restore --output ./artifacts/packages

      - name: Upload NuGet artifacts
        uses: actions/upload-artifact@v7.0.0
        with:
          name: nuget-packages
          path: ./artifacts/packages/*.nupkg
          if-no-files-found: error

  publish:
    name: Publish
    runs-on: ubuntu-latest
    needs:
      - pack
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5.2.0
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          global-json-file: global.json

      - name: Download NuGet artifacts
        uses: actions/download-artifact@v4.1.9
        with:
          name: nuget-packages
          path: ./artifacts/packages

      - name: Publish NuGet packages
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: dotnet nuget push "./artifacts/packages/*.nupkg" --api-key "$NUGET_API_KEY" --source https://api.nuget.org/v3/index.json --skip-duplicate

